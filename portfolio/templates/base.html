{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ profile.name|default:"Subin S R" }} | Portfolio</title>
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <div class="main-container">
        <header>
            <div class="brand-name">
                <a href="/" class="logo-link">
                    <img src="{% static 'images/logo.jpeg' %}" alt="Subin S R Logo" class="logo-img">
                    <span class="logo-text">Subin S R</span>
                </a>
            </div>
            <button class="menu-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav>
                <ul>
                    <li><a class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="/">Home</a></li>
                    <li><a class="{% if request.resolver_match.url_name == 'about' %}active{% endif %}" href="/about/">About</a></li>
                    <li><a class="{% if request.resolver_match.url_name == 'skills' %}active{% endif %}" href="/skills/">Skills</a></li>
                    <li><a class="{% if request.resolver_match.url_name == 'education' %}active{% endif %}" href="/education/">Education</a></li>
                    <li><a class="{% if request.resolver_match.url_name == 'projects' %}active{% endif %}" href="/projects/">Projects</a></li>
                    <li><a class="{% if request.resolver_match.url_name == 'contact' %}active{% endif %}" href="/contact/">Contact</a></li>
                </ul>
            </nav>
        </header>

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <script src="{% static 'js/script.js' %}"></script>

</body>
</html>
